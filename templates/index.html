<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduBot – CSC 309 Mini Project</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161b24;
    --card: #1e2535;
    --border: #2a3347;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --user-bubble: #1a3a5c;
    --bot-bubble: #1a2e20;
    --text: #e8edf5;
    --muted: #6b7a99;
    --danger: #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .bot-avatar {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(0,229,160,0.3);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(0,229,160,0.3); }
    50% { box-shadow: 0 0 35px rgba(0,229,160,0.6); }
  }

  .header-info h1 {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .header-info p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tag {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--card);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Quick suggestions */
  .suggestions {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .suggestions::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip:hover, .chip:active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 5;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: slide-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .bot .msg-icon {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .user .msg-icon {
    background: var(--user-bubble);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  .bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid rgba(0,229,160,0.15);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(0,153,255,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 5px;
    letter-spacing: 0.5px;
  }
  .user .bubble .label { color: var(--accent2); text-align: right; }

  .bubble ul {
    padding-left: 18px;
    margin-top: 6px;
  }
  .bubble li { margin-bottom: 3px; }

  /* Typing indicator */
  .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #userInput {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  #userInput:focus { border-color: var(--accent); }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #000;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  #sendBtn:active { transform: scale(0.93); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px;
    background: var(--bg);
    position: relative; z-index: 10;
  }
  .footer-note span { color: var(--accent); font-family: 'Space Mono', monospace; }
</style>
</head>
<body>

<header>
  <div class="bot-avatar">🎓</div>
  <div class="header-info">
    <h1>EduBot</h1>
    <p><span class="status-dot"></span>Rule-Based AI · Online</p>
  </div>
  <div class="tag">CSC 309</div>
</header>

<div class="suggestions" id="chips">
  <button class="chip" onclick="sendChip(this)">What is AI?</button>
  <button class="chip" onclick="sendChip(this)">How do I study?</button>
  <button class="chip" onclick="sendChip(this)">What is NLP?</button>
  <button class="chip" onclick="sendChip(this)">Help with exams</button>
  <button class="chip" onclick="sendChip(this)">Tell me a joke</button>
  <button class="chip" onclick="sendChip(this)">What courses exist?</button>
  <button class="chip" onclick="sendChip(this)">Hello!</button>
</div>

<div id="chat"></div>

<div class="input-area">
  <textarea id="userInput" placeholder="Ask me anything school-related…" rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="handleSend()" title="Send">➤</button>
</div>
<div class="footer-note">Rule-Based Pattern Matching · <span>Python + NLTK concepts</span> in JS</div>

<script>
// ─────────────────────────────────────────────
//  RULE BASE  –  Pattern → Response mapping
// ─────────────────────────────────────────────
const RULES = [
  {
    patterns: [/\b(hi|hello|hey|howdy|good (morning|afternoon|evening))\b/i],
    responses: [
      "Hello! 👋 I'm EduBot, your school assistant. Ask me anything about your studies!",
      "Hey there! Great to see you. What can I help you learn today?",
    ]
  },
  {
    patterns: [/\b(how are you|how do you do|you okay)\b/i],
    responses: [
      "I'm running perfectly — all rules loaded! 😄 How can I assist your studies today?",
      "Doing great, thanks for asking! Ready to help you ace your courses. 📚"
    ]
  },
  {
    patterns: [/\b(what is|explain|define|meaning of|tell me about)\b.*(artificial intelligence|ai)\b/i],
    responses: [
      "**Artificial Intelligence (AI)** is the simulation of human intelligence in machines.\n\nKey branches:\n• Machine Learning – systems that learn from data\n• NLP – understanding human language\n• Computer Vision – interpreting images\n• Rule-Based AI – this chatbot! Uses predefined rules to respond.\n\nAI is used in phones, hospitals, cars, and more. 🤖"
    ]
  },
  {
    patterns: [/\b(what is|explain|define|tell me about)\b.*(nlp|natural language processing)\b/i],
    responses: [
      "**Natural Language Processing (NLP)** is a branch of AI that helps computers understand, interpret, and generate human language.\n\nKey NLP tasks:\n• Tokenization – splitting text into words\n• Pattern matching – finding keywords (like this bot!)\n• Sentiment analysis – detecting emotion in text\n• Named Entity Recognition – spotting names, places\n\nTools: Python's **NLTK** library is perfect for learning NLP basics! 🐍"
    ]
  },
  {
    patterns: [/\b(what is|explain|define)\b.*(nltk|natural language toolkit)\b/i],
    responses: [
      "**NLTK (Natural Language Toolkit)** is a leading Python library for NLP.\n\nYou can use it to:\n• Tokenize sentences and words\n• Remove stopwords (common words like 'the', 'is')\n• Perform stemming (reducing words to root form)\n• Tag parts of speech (noun, verb, etc.)\n\nInstall it with: `pip install nltk` in Python. 🛠️"
    ]
  },
  {
    patterns: [/\b(pattern matching|how does this bot work|how do you work|rule.based)\b/i],
    responses: [
      "I use **Rule-Based Pattern Matching**! Here's how:\n\n1. You type a message\n2. I scan it against a list of regex patterns\n3. I find the best-matching rule\n4. I return a predefined response\n\nIt's simple but powerful for specific domains like school Q&A. This is exactly what CSC 309 is teaching you! 🎓"
    ]
  },
  {
    patterns: [/\b(study|studying|how to study|study tips|learn better|memorize)\b/i],
    responses: [
      "Here are proven study strategies:\n\n📌 **Active Recall** – test yourself instead of re-reading\n📌 **Spaced Repetition** – review at increasing intervals\n📌 **Pomodoro Technique** – 25 min focus, 5 min break\n📌 **Mind Maps** – visualize connections between ideas\n📌 **Teach It** – if you can explain it, you know it!\n\nConsistency beats cramming every time. 💪"
    ]
  },
  {
    patterns: [/\b(exam|test|quiz|prepare for|revision|revise)\b/i],
    responses: [
      "**Exam Preparation Tips:**\n\n✅ Start at least a week before\n✅ Review past questions — patterns repeat!\n✅ Summarize notes in your own words\n✅ Sleep well the night before (crucial for memory)\n✅ Eat before the exam — your brain needs fuel\n✅ Arrive early and stay calm\n\nYou've got this! 🏆"
    ]
  },
  {
    patterns: [/\b(assignment|project|coursework|submission|deadline)\b/i],
    responses: [
      "For assignments and projects:\n\n📂 Break it into smaller tasks with mini-deadlines\n📂 Don't wait for inspiration — start messy, refine later\n📂 Cite your sources properly to avoid plagiarism\n📂 Submit early if possible — last-minute uploads can fail!\n\nFor coding projects like this CSC 309 one, test frequently as you build. 💻"
    ]
  },
  {
    patterns: [/\b(python|programming|code|coding|how to code)\b/i],
    responses: [
      "**Python** is one of the best languages for beginners and AI development!\n\nTo get started:\n• Install Python from python.org\n• Use VS Code or even Google Colab (works in browser!)\n• Practice on: w3schools.com, replit.com, or kaggle.com\n\nFor your CSC 309 chatbot:\n```python\nimport nltk\nfrom nltk.tokenize import word_tokenize\n```\nWant to know more about the chatbot code? Just ask! 🐍"
    ]
  },
  {
    patterns: [/\b(courses?|subject|department|registration|enroll|gpa|grade)\b/i],
    responses: [
      "For course-related queries, I'd recommend:\n\n🏫 Visiting your department's notice board or portal\n🏫 Asking your academic advisor for personalized guidance\n🏫 Checking your school's student handbook\n\nIs there a specific subject area I can explain or help you study? 📖"
    ]
  },
  {
    patterns: [/\b(what is|define|explain)\b.*(machine learning|ml)\b/i],
    responses: [
      "**Machine Learning (ML)** is a type of AI where systems learn from data without being explicitly programmed.\n\nTypes of ML:\n• **Supervised** – learns from labeled data (e.g., spam detection)\n• **Unsupervised** – finds hidden patterns (e.g., clustering)\n• **Reinforcement** – learns by reward/punishment (e.g., game AI)\n\nML is the engine behind recommendations on Netflix, YouTube, etc. 🎬"
    ]
  },
  {
    patterns: [/\b(database|sql|data structure|algorithm|network|operating system|os)\b/i],
    responses: [
      "Great CS topic! Here's a quick overview:\n\n• **Database/SQL** – storing & querying structured data\n• **Data Structures** – ways to organize data (arrays, trees, graphs)\n• **Algorithms** – step-by-step problem-solving methods\n• **Networking** – how computers communicate (TCP/IP, HTTP)\n• **OS** – software managing hardware resources\n\nWhich one would you like me to explain in detail? 🖥️"
    ]
  },
  {
    patterns: [/\b(joke|funny|make me laugh|humor)\b/i],
    responses: [
      "Why do programmers prefer dark mode? 🌙\n\n…Because light attracts bugs! 🐛😄",
      "Why did the student eat his homework?\n\n…Because the teacher told him it was a piece of cake! 🎂😂",
      "What did one AI say to the other?\n\n…'I think, therefore I am… probably overfitting.' 🤖"
    ]
  },
  {
    patterns: [/\b(thank|thanks|thank you|appreciate|helpful)\b/i],
    responses: [
      "You're very welcome! 😊 Keep up the great work on your studies!",
      "Anytime! That's what I'm here for. Good luck with CSC 309! 🎓",
      "Happy to help! Don't hesitate to ask if you have more questions. 💪"
    ]
  },
  {
    patterns: [/\b(bye|goodbye|see you|later|exit|quit)\b/i],
    responses: [
      "Goodbye! Good luck with your CSC 309 project. You've got this! 🚀",
      "See you later! Keep studying hard. Bye! 👋"
    ]
  },
  {
    patterns: [/\b(who (are|made|built|created) you|your name|what are you)\b/i],
    responses: [
      "I'm **EduBot** 🎓 — a Rule-Based AI Chatbot built for the CSC 309 Mini Project!\n\nI was created using pattern matching techniques (similar to Python + NLTK concepts).\n\nI'm designed to answer school-related questions and help students like you! 📚"
    ]
  },
];

// Fallback responses
const FALLBACKS = [
  "Hmm, I'm not sure about that one. Try asking about AI, NLP, study tips, exams, or Python! 🤔",
  "That's outside my knowledge base. I'm specialized in school-related topics — try rephrasing!",
  "I didn't quite catch that. Ask me about: AI, NLP, study strategies, or your CSC courses! 📖",
];

// ─────────────────────────────────────────────
//  MATCHING ENGINE
// ─────────────────────────────────────────────
function getResponse(input) {
  const text = input.trim().toLowerCase();
  for (const rule of RULES) {
    for (const pattern of rule.patterns) {
      if (pattern.test(text)) {
        const arr = rule.responses;
        return arr[Math.floor(Math.random() * arr.length)];
      }
    }
  }
  return FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
}

// ─────────────────────────────────────────────
//  UI FUNCTIONS
// ─────────────────────────────────────────────
const chat = document.getElementById('chat');

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(0,229,160,0.1);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:12px;">$1</code>')
    .replace(/```[\s\S]*?```/g, m => {
      const code = m.replace(/```\w*\n?/, '').replace(/```$/, '');
      return `<pre style="background:#0d1117;padding:10px 12px;border-radius:8px;overflow-x:auto;margin-top:6px;font-size:12px;border-left:3px solid var(--accent)"><code>${code}</code></pre>`;
    })
    .replace(/•\s(.*?)(?=\n|$)/g, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'bot' ? '🎓' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'bot' ? 'EDUBOT' : 'YOU';
  bubble.appendChild(label);

  const content = document.createElement('div');
  content.innerHTML = formatText(text);
  bubble.appendChild(content);

  div.appendChild(icon);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-icon">🎓</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function handleSend() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  inp.value = '';
  inp.style.height = 'auto';

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  showTyping();

  // Simulate thinking delay (rule-based in reality is instant)
  const delay = 600 + Math.random() * 600;
  setTimeout(() => {
    removeTyping();
    const response = getResponse(text);
    addMessage(response, 'bot');
    btn.disabled = false;
  }, delay);
}

function sendChip(el) {
  document.getElementById('userInput').value = el.textContent;
  handleSend();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Welcome message
setTimeout(() => {
  addMessage(
    "Hello! 👋 Welcome to **EduBot** — your intelligent school assistant.\n\nI'm a **Rule-Based AI Chatbot** built with pattern matching (the same concept as Python + NLTK).\n\nYou can ask me about:\n• Artificial Intelligence & NLP\n• Study tips & exam strategies\n• Programming & Python\n• Computer Science concepts\n\nTap a suggestion above or type your question below! 🚀",
    'bot'
  );
}, 400);
</script>
</body>
</html>
